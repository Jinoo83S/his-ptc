<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS PTC 예약 2026 · 과목 목록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --nv:#0F1F5C; --nv2:#1B2F7A; --nv3:#2C4099;
  --gd:#C9940A; --gd2:#E8B020; --gd3:#FBD155;
  --bg:#EEF1F9; --wh:#FFF; --tx:#111827; --sb:#5B6888; --bd:#D8DDED;
  --gn:#15803D; --gnb:#DCFCE7; --rd:#DC2626; --rdb:#FEF2F2;
  --r:14px; --rlg:22px;
  --sh:0 2px 16px rgba(15,31,92,.08);
  --shh:0 8px 36px rgba(15,31,92,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(150deg,var(--nv) 0%,var(--nv2) 45%,#1A3A8F 100%);color:var(--tx);min-height:100dvh}
button{cursor:pointer;font-family:inherit;border:none}
.hidden{display:none!important}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--tx);color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:500;white-space:nowrap;max-width:90vw;z-index:10000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 20px rgba(0,0,0,.22)}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--gn)}
#toast.err{background:var(--rd)}

.page{min-height:100dvh;padding:34px 14px 54px}
.wrap{max-width:760px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
.brand{color:#fff}
.brand h1{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.2}
.brand p{margin-top:4px;font-size:12px;color:rgba(255,255,255,.72)}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn{
  padding:10px 14px;border-radius:12px;font-size:13px;font-weight:800;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.12);color:#fff;
  backdrop-filter:blur(8px);transition:all .15s;
}
.btn:hover{background:rgba(255,255,255,.2)}
.btn.primary{background:linear-gradient(135deg,var(--gd2),var(--gd3));color:var(--nv);border:none}

.card{background:#fff;border-radius:var(--rlg);box-shadow:var(--shh)}
.hero{padding:24px 20px;margin-bottom:16px}
.hero-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--bg);border-radius:30px;padding:7px 14px;color:var(--nv2);font-size:12px;font-weight:800}
.student-name{font-size:28px;font-weight:900;color:var(--nv);line-height:1.2}
.student-meta{margin-top:8px;color:var(--sb);font-size:14px;font-weight:600}
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.summary-chip{background:#F8FAFF;border:1px solid var(--bd);border-radius:14px;padding:10px 12px;min-width:120px}
.summary-chip .k{display:block;font-size:11px;color:var(--sb);margin-bottom:4px}
.summary-chip .v{display:block;font-size:15px;font-weight:800;color:var(--nv)}

.section{padding:20px}
.section + .section{border-top:1px dashed var(--bd)}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.section-title h2{font-size:18px;color:var(--nv)}
.section-title .count{font-size:12px;font-weight:800;color:var(--nv2);background:var(--bg);padding:5px 10px;border-radius:999px}
.notice{padding:14px 16px;border-radius:14px;background:#FAFBFF;border:1px solid var(--bd);color:var(--sb);font-size:13px;line-height:1.65}
.list{display:grid;grid-template-columns:1fr;gap:12px}
.item{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff;box-shadow:var(--sh)}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.item-title{font-size:17px;font-weight:800;color:var(--nv);line-height:1.4}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:800;white-space:nowrap}
.pill.type{background:var(--bg);color:var(--nv2)}
.pill.scope.personal{background:var(--gnb);color:var(--gn)}
.pill.scope.common{background:#FFF7E6;color:#9A6700}
.meta-row{display:flex;flex-wrap:wrap;gap:8px}
.meta-chip{font-size:13px;font-weight:700;color:var(--sb);background:#F8FAFF;border-radius:10px;padding:7px 10px}
.empty{padding:22px;border-radius:18px;background:#FAFBFF;border:1px dashed var(--bd);text-align:center;color:var(--sb)}

@media(min-width:700px){
  .page{padding:40px 20px 60px}
  .hero{padding:28px 26px}
  .section{padding:24px 26px}
}
</style>
</head>
<body>
<div id="toast"></div>
<div class="page">
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>Handong International School</h1>
        <p>PTC 예약 2026 · 수강 과목 확인</p>
      </div>
      <div class="top-actions">
        <button class="btn" type="button" onclick="goBack()">← 로그인으로</button>
        <button class="btn primary" type="button" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="card hero">
      <div class="hero-head">
        <div>
          <div class="badge">📘 로그인 학생 정보</div>
          <div class="student-name" id="student-name">불러오는 중…</div>
          <div class="student-meta" id="student-meta"></div>
        </div>
      </div>
      <div class="summary">
        <div class="summary-chip">
          <span class="k">예약 가능 횟수</span>
          <span class="v" id="student-reserve-count">-</span>
        </div>
        <div class="summary-chip">
          <span class="k">불러온 과목 수</span>
          <span class="v" id="subject-count">-</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <div class="section-title">
          <h2>과목 목록</h2>
          <span class="count" id="subject-count-chip">0개</span>
        </div>
        <div class="notice">
          아래 목록에는 <strong>학생 이름이 로그인된 이름과 정확히 일치하는 과목</strong>과
          <strong>이름이 비어 있으면서 로그인된 학년·반과 일치하는 공통 과목</strong>이 함께 표시됩니다.
        </div>
      </div>
      <div class="section">
        <div id="subject-list" class="list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const student = readStudent();

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 3500);
}

function readStudent() {
  try {
    const raw = sessionStorage.getItem('his_student');
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function logout() {
  sessionStorage.removeItem('his_student');
  location.href = 'index.html';
}

function goBack() {
  location.href = 'index.html';
}

function normalizeText(v) {
  return String(v ?? '').trim();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fillStudentInfo() {
  if (!student) {
    toast('로그인 정보가 없어 다시 로그인 화면으로 이동합니다.', 'err');
    setTimeout(() => location.href = 'index.html', 700);
    return false;
  }

  document.getElementById('student-name').textContent = student.이름 || '-';
  document.getElementById('student-meta').textContent = `${student.학년}학년 ${student.반}반`;
  document.getElementById('student-reserve-count').textContent = student.예약횟수 ?? '-';
  return true;
}

function pickSubjects(rows) {
  const grade = normalizeText(student.학년);
  const cls = normalizeText(student.반);
  const name = normalizeText(student.이름);

  const filtered = rows.filter(row => {
    const rowName = normalizeText(row['이름']);
    const sameName = rowName === name;
    const blankNameSameClass = rowName === '' &&
      normalizeText(row['학년']) === grade &&
      normalizeText(row['반']) === cls;

    return sameName || blankNameSameClass;
  }).map((row, index) => {
    const rowName = normalizeText(row['이름']);
    return {
      ...row,
      _scope: rowName === name ? 'personal' : 'common',
      _scopeLabel: rowName === name ? '개인 과목' : '학년/반 공통',
      _index: index
    };
  });

  filtered.sort((a, b) => {
    const scopeOrder = (a._scope === 'personal' ? 0 : 1) - (b._scope === 'personal' ? 0 : 1);
    if (scopeOrder !== 0) return scopeOrder;
    return normalizeText(a['과목']).localeCompare(normalizeText(b['과목']), 'ko');
  });

  return filtered;
}

function renderSubjects(items) {
  const list = document.getElementById('subject-list');
  document.getElementById('subject-count').textContent = items.length;
  document.getElementById('subject-count-chip').textContent = `${items.length}개`;

  if (!items.length) {
    list.innerHTML = `
      <div class="empty">
        로그인된 학생 기준으로 표시할 과목이 없습니다.<br>
        subjects.json 데이터 또는 이름/학년/반 값을 확인해주세요.
      </div>
    `;
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="item">
      <div class="item-top">
        <div class="item-title">${escapeHtml(item['과목'])}</div>
        <span class="pill scope ${item._scope}">${item._scopeLabel}</span>
      </div>
      <div class="meta-row">
        <span class="pill type">${escapeHtml(item['분류'] || '미분류')}</span>
        <span class="meta-chip">교사: ${escapeHtml(item['교사'] || '-')}</span>
        <span class="meta-chip">학년/반: ${escapeHtml(item['학년'])}학년 ${escapeHtml(item['반'])}반</span>
        ${normalizeText(item['이름']) ? `<span class="meta-chip">이름 기준: ${escapeHtml(item['이름'])}</span>` : `<span class="meta-chip">이름 기준: 공통</span>`}
      </div>
    </div>
  `).join('');
}

async function init() {
  if (!fillStudentInfo()) return;

  try {
    const response = await fetch('subjects.json');
    if (!response.ok) throw new Error('subjects.json fetch failed');
    const rows = await response.json();
    const items = pickSubjects(rows);
    renderSubjects(items);
  } catch (e) {
    console.error(e);
    toast('과목 데이터를 불러오지 못했습니다.', 'err');
    document.getElementById('subject-list').innerHTML = `
      <div class="empty">subjects.json을 불러오지 못했습니다.</div>
    `;
  }
}

init();
</script>
</body>
</html>
