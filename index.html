<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS PTC 예약 | Handong International School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ─── CSS 변수 ──────────────────────────────────── */
:root {
  --navy:      #1B2A5E;
  --navy-dark: #111C42;
  --navy-light:#2E3F7F;
  --gold:      #D4A017;
  --gold-light:#F0C040;
  --bg:        #F0F2F8;
  --card:      #FFFFFF;
  --text:      #1A1F36;
  --muted:     #6B7280;
  --border:    #E2E6F0;
  --success:   #16A34A;
  --danger:    #DC2626;
  --danger-bg: #FEF2F2;
  --radius:    14px;
  --shadow:    0 4px 24px rgba(27,42,94,0.10);
  --shadow-lg: 0 12px 40px rgba(27,42,94,0.18);
}

/* ─── 리셋 ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ─── 뷰 전환 ───────────────────────────────────── */
.view { display: none; min-height: 100dvh; }
.view.active { display: flex; flex-direction: column; }

/* ─── 로딩 오버레이 ─────────────────────────────── */
#loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(17,28,66,0.55);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
#loading-overlay.show { display: flex; }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: var(--gold-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #fff; font-size: 14px; font-weight: 500; letter-spacing: 0.5px; }

/* ─── 토스트 알림 ───────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--text); color: #fff;
  padding: 12px 24px; border-radius: 30px;
  font-size: 14px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 10000; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap; max-width: 90vw;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { background: var(--success); }
#toast.error   { background: var(--danger); }

/* ═══════════════════════════════════════════════════
   VIEW 1 — 로그인
══════════════════════════════════════════════════ */
#view-login {
  background: linear-gradient(145deg, var(--navy-dark) 0%, var(--navy) 50%, var(--navy-light) 100%);
  align-items: center; justify-content: center;
  padding: 24px;
  position: relative; overflow: hidden;
}

/* 배경 장식 */
#view-login::before, #view-login::after {
  content: ''; position: absolute; border-radius: 50%; opacity: 0.06;
}
#view-login::before {
  width: 500px; height: 500px;
  background: var(--gold);
  top: -150px; right: -150px;
}
#view-login::after {
  width: 300px; height: 300px;
  background: var(--gold-light);
  bottom: -80px; left: -80px;
}

.login-card {
  background: rgba(255,255,255,0.97);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%; max-width: 420px;
  box-shadow: var(--shadow-lg);
  position: relative; z-index: 1;
  animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(30px); }
  to   { opacity:1; transform: translateY(0); }
}

.login-logo {
  text-align: center; margin-bottom: 32px;
}
.login-logo .school-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  border-radius: 20px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(27,42,94,0.3);
}
.login-logo .school-badge span { font-size: 32px; }
.login-logo h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px; color: var(--navy);
  letter-spacing: -0.5px;
}
.login-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }

.ptc-badge {
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  color: #fff; border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 28px;
  display: flex; align-items: center; gap: 12px;
}
.ptc-badge .icon { font-size: 24px; }
.ptc-badge .info { flex: 1; }
.ptc-badge .info strong { display: block; font-size: 15px; font-weight: 700; }
.ptc-badge .info span { font-size: 12px; opacity: 0.8; }

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--navy); margin-bottom: 8px;
}
.form-group input {
  width: 100%; padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-family: inherit; font-size: 15px; color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #FAFBFF;
  outline: none;
}
.form-group input:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 4px rgba(27,42,94,0.08);
}
.form-group input::placeholder { color: #BDC3D4; }

.btn-login {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  color: #fff; border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.5px;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(27,42,94,0.3);
  margin-top: 8px;
}
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(27,42,94,0.35); }
.btn-login:active { transform: translateY(0); }

.login-hint { text-align: center; margin-top: 16px; font-size: 12px; color: var(--muted); }

/* ═══════════════════════════════════════════════════
   VIEW 2 — 교사 목록
══════════════════════════════════════════════════ */
#view-teachers { background: var(--bg); }

.top-bar {
  background: linear-gradient(135deg, var(--navy-dark), var(--navy));
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(27,42,94,0.2);
}
.top-bar .back-btn {
  background: rgba(255,255,255,0.12); border: none;
  width: 36px; height: 36px; border-radius: 10px;
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.top-bar .back-btn:hover { background: rgba(255,255,255,0.2); }
.top-bar .bar-title { flex:1; color: #fff; }
.top-bar .bar-title h2 { font-size: 17px; font-weight: 700; }
.top-bar .bar-title p  { font-size: 12px; opacity: 0.75; margin-top: 1px; }
.top-bar .my-res-btn {
  background: var(--gold); border: none;
  padding: 8px 14px; border-radius: 10px;
  color: var(--navy-dark); font-family: inherit;
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.top-bar .my-res-btn:hover { background: var(--gold-light); }

.student-info-bar {
  background: #fff;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.student-info-bar .s-name { font-weight: 700; font-size: 15px; }
.student-info-bar .s-grade { font-size: 13px; color: var(--muted); }
.quota-pill {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 30px; padding: 6px 14px;
  font-size: 13px; font-weight: 700; color: var(--navy);
}
.quota-pill.warn { border-color: var(--gold); background: #FFFBEB; color: #92400E; }
.quota-pill.full { border-color: var(--danger); background: var(--danger-bg); color: var(--danger); }

.section-label {
  padding: 16px 20px 8px;
  font-size: 11px; font-weight: 700;
  color: var(--muted); letter-spacing: 1.5px;
  text-transform: uppercase;
}

.teacher-list { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 10px; }

.teacher-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow); border: 1.5px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.teacher-card:hover { border-color: var(--navy); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.teacher-card.booked { border-color: var(--success); background: #F0FDF4; cursor: default; }
.teacher-card.booked:hover { transform: none; box-shadow: var(--shadow); }

.teacher-avatar {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.type-subject  .teacher-avatar { background: #EEF2FF; }
.type-homeroom .teacher-avatar { background: #FFF7ED; }
.type-career   .teacher-avatar { background: #F0FDF4; }

.teacher-info { flex: 1; min-width: 0; }
.teacher-info .t-name { font-size: 15px; font-weight: 700; }
.teacher-info .t-sub  { font-size: 13px; color: var(--muted); margin-top: 2px; }

.teacher-tag {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; letter-spacing: 0.3px; flex-shrink: 0;
}
.tag-subject  { background: #EEF2FF; color: #4338CA; }
.tag-homeroom { background: #FFF7ED; color: #C2410C; }
.tag-career   { background: #F0FDF4; color: #15803D; }
.tag-booked   { background: #DCFCE7; color: #15803D; }

.chevron { color: var(--muted); font-size: 18px; flex-shrink: 0; }
.booked-check { color: var(--success); font-size: 20px; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════
   모달 — 시간 선택
══════════════════════════════════════════════════ */
#modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(10,16,40,0.6);
  backdrop-filter: blur(4px);
  display: none; align-items: flex-end; justify-content: center;
  padding: 0;
}
#modal-overlay.show { display: flex; }

.time-modal {
  background: var(--card);
  border-radius: 24px 24px 0 0;
  width: 100%; max-width: 540px;
  max-height: 85dvh;
  display: flex; flex-direction: column;
  animation: slideModal 0.35s cubic-bezier(0.16,1,0.3,1);
  overflow: hidden;
}
@keyframes slideModal {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.modal-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
}
.modal-header .teacher-info-modal .t-name { font-size: 18px; font-weight: 700; }
.modal-header .teacher-info-modal .t-sub  { font-size: 14px; color: var(--muted); margin-top: 3px; }
.modal-close {
  background: var(--bg); border: none; width: 32px; height: 32px;
  border-radius: 50%; cursor: pointer; font-size: 18px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.modal-body { overflow-y: auto; padding: 16px 20px 24px; flex: 1; }

.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.time-slot {
  background: #F8F9FF; border: 2px solid var(--border);
  border-radius: 12px; padding: 12px 8px;
  text-align: center; cursor: pointer;
  transition: all 0.15s;
}
.time-slot:hover:not(.taken) {
  border-color: var(--navy); background: #EEF2FF;
  transform: translateY(-1px);
}
.time-slot .time-start { font-size: 16px; font-weight: 700; color: var(--navy); }
.time-slot .time-end   { font-size: 11px; color: var(--muted); margin-top: 2px; }
.time-slot.taken {
  background: #F9FAFB; border-color: #E5E7EB;
  cursor: not-allowed; opacity: 0.55;
}
.time-slot.taken .time-start { color: var(--muted); }
.time-slot.taken::after {
  content: '마감'; display: block;
  font-size: 10px; font-weight: 700; color: var(--danger);
  margin-top: 4px;
}

/* ═══════════════════════════════════════════════════
   VIEW 3 — 내 예약
══════════════════════════════════════════════════ */
#view-reservations { background: var(--bg); }

.res-list { padding: 16px 16px 32px; display: flex; flex-direction: column; gap: 12px; }

.res-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.res-card-head {
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
}
.res-card-head .r-icon { font-size: 22px; }
.res-card-head .r-teacher { flex:1; }
.res-card-head .r-teacher strong { color: #fff; font-size: 15px; display: block; }
.res-card-head .r-teacher span  { color: rgba(255,255,255,0.7); font-size: 12px; }

.res-card-body { padding: 14px 16px; }
.res-time-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 22px; font-weight: 900; color: var(--navy);
  letter-spacing: -1px;
}
.res-time-row .sep { color: var(--muted); font-size: 14px; font-weight: 400; }
.res-date { font-size: 13px; color: var(--muted); margin-top: 4px; }

.btn-cancel {
  width: 100%; margin-top: 12px;
  padding: 11px;
  background: var(--danger-bg); color: var(--danger);
  border: 1.5px solid #FECACA; border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background 0.2s;
}
.btn-cancel:hover { background: #FEE2E2; }

.empty-state {
  text-align: center; padding: 60px 20px;
}
.empty-state .e-icon { font-size: 56px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 700; color: var(--navy); }
.empty-state p  { font-size: 14px; color: var(--muted); margin-top: 6px; }

/* ─── 확인 모달 ─────────────────────────────────── */
#confirm-overlay {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(10,16,40,0.6);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
#confirm-overlay.show { display: flex; }

.confirm-box {
  background: var(--card); border-radius: 20px;
  padding: 28px 24px; width: 100%; max-width: 360px;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes popIn {
  from { opacity:0; transform: scale(0.9); }
  to   { opacity:1; transform: scale(1); }
}
.confirm-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.confirm-box p  { font-size: 14px; color: var(--muted); line-height: 1.6; }
.confirm-info {
  background: var(--bg); border-radius: 12px;
  padding: 14px; margin: 16px 0;
}
.confirm-info .ci-row { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; }
.confirm-info .ci-row strong { color: var(--navy); font-weight: 700; }
.confirm-btns { display: flex; gap: 10px; }
.btn-cf-cancel { flex:1; padding:12px; background:var(--bg); border:1.5px solid var(--border); border-radius:12px; font-family:inherit; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; }
.btn-cf-confirm { flex:2; padding:12px; background:linear-gradient(135deg,var(--navy),var(--navy-light)); border:none; border-radius:12px; font-family:inherit; font-size:14px; font-weight:700; color:#fff; cursor:pointer; }

/* ─── 반응형 ─────────────────────────────────────── */
@media (min-width: 540px) {
  .login-card { padding: 56px 52px; }
  .time-grid { grid-template-columns: repeat(4, 1fr); }
  #modal-overlay { align-items: center; padding: 20px; }
  .time-modal { border-radius: 24px; max-height: 80dvh; }
}
</style>
</head>
<body>

<!-- ── 로딩 오버레이 ──────────────────────────── -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p class="loading-text" id="loading-text">처리 중...</p>
</div>

<!-- ── 토스트 ─────────────────────────────────── -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════
     VIEW 1 — 로그인
══════════════════════════════════════════════ -->
<div id="view-login" class="view active">
  <div class="login-card">
    <div class="login-logo">
      <div class="school-badge"><span>🎓</span></div>
      <h1>Handong International School</h1>
      <p>한동글로벌학교 중고등부</p>
    </div>

    <div class="ptc-badge">
      <div class="icon">📅</div>
      <div class="info">
        <strong>PTC 예약 시스템</strong>
        <span>Parent-Teacher Conference 2026 · 5월 15일</span>
      </div>
    </div>

    <div class="form-group">
      <label>학생 이름</label>
      <input type="text" id="input-name" placeholder="예) 홍길동" autocomplete="off">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="input-birth" placeholder="비밀번호를 입력하세요" inputmode="numeric">
    </div>
    <button class="btn-login" onclick="handleLogin()">로그인</button>
    <p class="login-hint">비밀번호는 생년월일 6자리 입니다. | The password is your 6-digit date of birth.</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     VIEW 2 — 교사 목록
══════════════════════════════════════════════ -->
<div id="view-teachers" class="view">
  <div class="top-bar">
    <button class="back-btn" onclick="showView('login')">←</button>
    <div class="bar-title">
      <h2>상담 선생님 선택</h2>
      <p>예약할 선생님을 선택하세요</p>
    </div>
    <button class="my-res-btn" onclick="loadMyReservations()">📋 내 예약</button>
  </div>

  <div class="student-info-bar">
    <div>
      <div class="s-name" id="bar-student-name">—</div>
      <div class="s-grade" id="bar-student-grade">—</div>
    </div>
    <div class="quota-pill" id="quota-pill">예약 0 / 0</div>
  </div>

  <div id="teacher-list-container">
    <!-- JS로 렌더링 -->
  </div>
</div>

<!-- ══════════════════════════════════════════════
     모달 — 시간 선택
══════════════════════════════════════════════ -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="time-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="teacher-info-modal">
        <div class="t-name" id="modal-teacher-name">—</div>
        <div class="t-sub"  id="modal-teacher-sub">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="time-grid" id="time-grid-container">
        <!-- JS로 렌더링 -->
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     VIEW 3 — 내 예약
══════════════════════════════════════════════ -->
<div id="view-reservations" class="view">
  <div class="top-bar">
    <button class="back-btn" onclick="showView('teachers')">←</button>
    <div class="bar-title">
      <h2>내 예약 현황</h2>
      <p id="res-bar-name">—</p>
    </div>
  </div>

  <div class="res-list" id="reservation-list-container">
    <!-- JS로 렌더링 -->
  </div>
</div>

<!-- ══════════════════════════════════════════════
     예약 확인 모달
══════════════════════════════════════════════ -->
<div id="confirm-overlay">
  <div class="confirm-box">
    <h3>✅ 예약 확인</h3>
    <p>아래 내용으로 예약하시겠습니까?</p>
    <div class="confirm-info">
      <div class="ci-row"><span>선생님</span><strong id="cf-teacher">—</strong></div>
      <div class="ci-row"><span>과목/유형</span><strong id="cf-subject">—</strong></div>
      <div class="ci-row"><span>날짜</span><strong id="cf-date">—</strong></div>
      <div class="ci-row"><span>시간</span><strong id="cf-time">—</strong></div>
    </div>
    <div class="confirm-btns">
      <button class="btn-cf-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-cf-confirm" onclick="confirmReservation()">예약하기</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     JavaScript
══════════════════════════════════════════════ -->
<script>
// ── 설정 ────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbxCo6nWp-enySKYL_BZKgJlbC_rbxRHH4DjfDwJMjlxKNNmWJxZObmMfnRVK4xdSL_42Q/exec';

// ── 상태 ────────────────────────────────────────
let state = {
  student:          null,
  teachers:         [],
  myReservations:   [],
  selectedTeacher:  null,
  selectedSlot:     null,
  reservedTeachers: new Set()
};

// ── API 호출 ─────────────────────────────────────
async function api(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res  = await fetch(url, { redirect: 'follow' });
  if (!res.ok) throw new Error('서버 오류: ' + res.status);
  return res.json();
}

// ── 로딩 표시 ────────────────────────────────────
function showLoading(msg = '처리 중...') {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}

// ── 토스트 ───────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── 뷰 전환 ─────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════
// 1. 로그인
// ═══════════════════════════════════════════════
async function handleLogin() {
  const name     = document.getElementById('input-name').value.trim();
  const password = document.getElementById('input-birth').value.trim();

  if (!name || !password) {
    showToast('이름과 비밀번호를 입력해주세요.', 'error'); return;
  }

  showLoading('로그인 중...');
  try {
    const data = await api({ action: 'login', name, password });
    if (!data.success) { showToast(data.error, 'error'); return; }

    state.student = data.student;
    await loadTeachers();
    updateStudentBar();
    showView('teachers');
  } catch(e) {
    showToast('서버에 연결할 수 없습니다.', 'error');
  } finally {
    hideLoading();
  }
}

// Enter 키 로그인
document.getElementById('input-birth').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('input-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('input-birth').focus();
});

// ═══════════════════════════════════════════════
// 2. 교사 목록
// ═══════════════════════════════════════════════
async function loadTeachers() {
  const data = await api({ action: 'getTeachers', student_id: state.student.student_id });
  if (!data.success) throw new Error(data.error);
  state.teachers = data.teachers;

  // 이미 예약된 교사 확인
  const resData = await api({ action: 'getReservations', student_id: state.student.student_id });
  if (resData.success) {
    state.myReservations = resData.reservations;
    state.reservedTeachers = new Set(resData.reservations.map(r => String(r.teacher_id)));
  }

  renderTeachers();
}

function renderTeachers() {
  const container = document.getElementById('teacher-list-container');
  const { teachers, reservedTeachers } = state;

  // 유형별 분류
  const groups = {
    homeroom: { label: '담임 선생님',   teachers: [], icon: '🏠' },
    career:   { label: '진로 상담',     teachers: [], icon: '🧭' },
    subject:  { label: '수강 과목 교사', teachers: [], icon: '📚' },
  };
  teachers.forEach(t => {
    const g = groups[t.type] || groups.subject;
    g.teachers.push(t);
  });

  let html = '';
  for (const [type, group] of Object.entries(groups)) {
    if (!group.teachers.length) continue;
    html += `<div class="section-label">${group.icon} ${group.label}</div>`;
    html += `<div class="teacher-list">`;
    group.teachers.forEach(t => {
      const booked    = reservedTeachers.has(String(t.teacher_id));
      const tagLabel  = booked ? '예약완료' : (t.type === 'homeroom' ? '담임' : t.type === 'career' ? '진로상담' : t.subject || '교과');
      const tagClass  = booked ? 'tag-booked' : `tag-${t.type}`;
      const cardClass = booked ? 'teacher-card booked' : `teacher-card type-${t.type}`;
      const emoji     = t.type === 'homeroom' ? '🏠' : t.type === 'career' ? '🧭' : '👨‍🏫';
      const right     = booked
        ? `<span class="booked-check">✓</span>`
        : `<span class="chevron">›</span>`;

      html += `
        <div class="${cardClass}" onclick="${booked ? '' : `openTimeSlots('${t.teacher_id}')`}">
          <div class="teacher-avatar">${emoji}</div>
          <div class="teacher-info">
            <div class="t-name">${t.name}</div>
            <div class="t-sub">${t.subject || (t.type === 'career' ? '진로상담' : '담임')}</div>
          </div>
          <span class="teacher-tag ${tagClass}">${tagLabel}</span>
          ${right}
        </div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html;
  updateQuotaPill();
}

function updateStudentBar() {
  const s = state.student;
  document.getElementById('bar-student-name').textContent = s.name;
  document.getElementById('bar-student-grade').textContent = `${s.grade}학년 ${s.class || ''}반`;
  document.getElementById('res-bar-name').textContent = s.name;
}

function updateQuotaPill() {
  const pill = document.getElementById('quota-pill');
  const curr = state.reservedTeachers.size;
  const max  = state.student.max_reservations;
  pill.textContent = `예약 ${curr} / ${max}`;
  pill.className   = 'quota-pill' + (curr >= max ? ' full' : curr >= max - 1 ? ' warn' : '');
}

// ═══════════════════════════════════════════════
// 3. 시간 슬롯
// ═══════════════════════════════════════════════
async function openTimeSlots(teacher_id) {
  // 예약 한도 확인
  if (state.reservedTeachers.size >= state.student.max_reservations) {
    showToast(`최대 예약 횟수(${state.student.max_reservations}회)에 도달했습니다.`, 'error');
    return;
  }

  const teacher = state.teachers.find(t => String(t.teacher_id) === String(teacher_id));
  state.selectedTeacher = teacher;

  document.getElementById('modal-teacher-name').textContent = teacher.name;
  document.getElementById('modal-teacher-sub').textContent  =
    teacher.subject || (teacher.type === 'career' ? '진로상담' : '담임');

  document.getElementById('time-grid-container').innerHTML =
    '<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--muted)">⏳ 불러오는 중...</div>';
  document.getElementById('modal-overlay').classList.add('show');

  try {
    const data = await api({ action: 'getTimeSlots', teacher_id });
    if (!data.success) { showToast(data.error, 'error'); closeModal(); return; }
    renderTimeSlots(data.slots);
  } catch(e) {
    showToast('시간 목록을 불러올 수 없습니다.', 'error');
    closeModal();
  }
}

function renderTimeSlots(slots) {
  const grid = document.getElementById('time-grid-container');
  if (!slots.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--muted)">등록된 시간 슬롯이 없습니다.</div>';
    return;
  }
  grid.innerHTML = slots.map(s => `
    <div class="time-slot ${s.is_available ? '' : 'taken'}"
         onclick="${s.is_available ? `selectSlot('${s.slot_id}','${s.start_time}','${s.end_time}','${s.date}')` : ''}">
      <div class="time-start">${s.start_time}</div>
      <div class="time-end">~ ${s.end_time}</div>
    </div>`).join('');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
  state.selectedSlot = null;
}

// ═══════════════════════════════════════════════
// 4. 예약 확인 & 처리
// ═══════════════════════════════════════════════
function selectSlot(slot_id, start, end, date) {
  state.selectedSlot = { slot_id, start, end, date };
  const t = state.selectedTeacher;
  document.getElementById('cf-teacher').textContent = t.name;
  document.getElementById('cf-subject').textContent = t.subject || (t.type === 'career' ? '진로상담' : '담임');
  document.getElementById('cf-date').textContent    = date || '2026-05-15';
  document.getElementById('cf-time').textContent    = `${start} ~ ${end}`;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
}

async function confirmReservation() {
  closeConfirm();
  closeModal();

  const { student, selectedTeacher, selectedSlot } = state;
  if (!selectedTeacher || !selectedSlot) return;

  showLoading('예약 처리 중...');
  try {
    const data = await api({
      action:     'reserve',
      student_id: student.student_id,
      teacher_id: selectedTeacher.teacher_id,
      slot_id:    selectedSlot.slot_id
    });

    if (!data.success) {
      showToast(data.error, 'error'); return;
    }

    showToast(`${selectedTeacher.name} 선생님 예약 완료! 🎉`, 'success');

    // 상태 갱신
    state.reservedTeachers.add(String(selectedTeacher.teacher_id));
    state.myReservations.push({
      reservation_id: data.reservation_id,
      teacher_id:     selectedTeacher.teacher_id,
      teacher_name:   selectedTeacher.name,
      subject:        selectedTeacher.subject,
      type:           selectedTeacher.type,
      date:           selectedSlot.date,
      start_time:     selectedSlot.start,
      end_time:       selectedSlot.end,
      status:         'confirmed'
    });
    renderTeachers();

  } catch(e) {
    showToast('예약 중 오류가 발생했습니다.', 'error');
  } finally {
    hideLoading();
    state.selectedSlot    = null;
    state.selectedTeacher = null;
  }
}

// ═══════════════════════════════════════════════
// 5. 내 예약 & 취소
// ═══════════════════════════════════════════════
async function loadMyReservations() {
  showLoading('예약 목록 조회 중...');
  try {
    const data = await api({ action: 'getReservations', student_id: state.student.student_id });
    if (!data.success) { showToast(data.error, 'error'); return; }
    state.myReservations = data.reservations;
    renderReservations();
    showView('reservations');
  } catch(e) {
    showToast('예약 목록을 불러올 수 없습니다.', 'error');
  } finally {
    hideLoading();
  }
}

function renderReservations() {
  const container = document.getElementById('reservation-list-container');
  const { myReservations } = state;

  if (!myReservations.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="e-icon">📭</div>
        <h3>예약 내역이 없습니다</h3>
        <p>선생님을 선택해 예약을 진행해주세요</p>
      </div>`;
    return;
  }

  const typeLabel = { subject:'교과', homeroom:'담임', career:'진로상담' };
  const typeEmoji = { subject:'📖', homeroom:'🏠', career:'🧭' };

  container.innerHTML = myReservations.map(r => `
    <div class="res-card" id="rescard-${r.reservation_id}">
      <div class="res-card-head">
        <span class="r-icon">${typeEmoji[r.type] || '👨‍🏫'}</span>
        <div class="r-teacher">
          <strong>${r.teacher_name}</strong>
          <span>${r.subject || typeLabel[r.type] || ''}</span>
        </div>
      </div>
      <div class="res-card-body">
        <div class="res-time-row">
          ${r.start_time}
          <span class="sep">→</span>
          ${r.end_time}
        </div>
        <div class="res-date">📅 ${r.date || '2026-05-15'}</div>
        <button class="btn-cancel" onclick="cancelReservation('${r.reservation_id}')">
          예약 취소
        </button>
      </div>
    </div>`).join('');
}

async function cancelReservation(reservation_id) {
  if (!confirm('정말 취소하시겠습니까?')) return;

  showLoading('취소 처리 중...');
  try {
    const data = await api({
      action: 'cancel',
      reservation_id,
      student_id: state.student.student_id
    });

    if (!data.success) { showToast(data.error, 'error'); return; }

    showToast('예약이 취소되었습니다.', 'success');

    // 상태 갱신
    const cancelled = state.myReservations.find(r => r.reservation_id === reservation_id);
    if (cancelled) state.reservedTeachers.delete(String(cancelled.teacher_id));
    state.myReservations = state.myReservations.filter(r => r.reservation_id !== reservation_id);

    renderReservations();
    renderTeachers();
    updateQuotaPill();

  } catch(e) {
    showToast('취소 중 오류가 발생했습니다.', 'error');
  } finally {
    hideLoading();
  }
}
</script>
</body>
</html>
