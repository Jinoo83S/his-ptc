<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS PTC 예약 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --nv:#0F1F5C; --nv2:#1B2F7A; --nv3:#2C4099;
  --gd:#C9940A; --gd2:#E8B020; --gd3:#FBD155;
  --bg:#EEF1F9; --wh:#FFF; --tx:#111827; --sb:#5B6888; --bd:#D8DDED;
  --gn:#15803D; --gnb:#DCFCE7; --rd:#DC2626; --rdb:#FEF2F2;
  --r:14px; --rlg:22px;
  --sh:0 2px 16px rgba(15,31,92,.08);
  --shh:0 8px 36px rgba(15,31,92,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh}
button{cursor:pointer;font-family:inherit;border:none}
.hidden{display:none!important}
.locked{opacity:.4;pointer-events:none}

/* ── 토스트 ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--tx);color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:500;white-space:nowrap;max-width:90vw;z-index:10000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 20px rgba(0,0,0,.22)}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--gn)}
#toast.err{background:var(--rd)}

/* ── 로그인 배경 ── */
#view-login{
  background:linear-gradient(150deg,var(--nv) 0%,var(--nv2) 45%,#1A3A8F 100%);
  display:flex;flex-direction:column;align-items:center;
  min-height:100dvh;padding:0 0 52px;overflow-y:auto;position:relative;
}
#view-login::before{
  content:'';position:absolute;top:-120px;right:-120px;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(251,209,85,.1),transparent 70%);
  border-radius:50%;pointer-events:none;
}

/* ── admin 버튼 ── */
.admin-btn{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.75);border-radius:9px;
  padding:6px 13px;font-size:12px;font-weight:700;
  transition:background .14s,color .14s;
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;
}
.admin-btn:hover{background:rgba(255,255,255,.22);color:#fff}

/* ── 헤더 ── */
.lhd{width:100%;padding:52px 24px 30px;text-align:center;position:relative}
.emblem{width:70px;height:70px;margin:0 auto 14px;background:linear-gradient(135deg,var(--gd2),var(--gd3));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 24px rgba(200,148,10,.36)}
.lhd h1{font-family:'DM Serif Display',serif;font-size:19px;color:#fff;letter-spacing:.3px}
.lhd .sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px}
.ptc-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:6px 15px;margin-top:12px;color:rgba(255,255,255,.82);font-size:12px;font-weight:600}

/* ── 카드 ── */
.lcard{background:#fff;width:100%;margin:0 14px;border-radius:var(--rlg);padding:24px 20px;box-shadow:var(--shh);animation:fadeUp .45s cubic-bezier(.16,1,.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

/* ── 단계 헤더 ── */
.step-hd{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.sn{width:25px;height:25px;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bd);color:var(--sb)}
.sn.active{background:var(--gd2);color:var(--nv)}
.sn.done{background:var(--gn);color:#fff}
.slabel{font-size:14px;font-weight:700;color:var(--nv)}
.sval{margin-left:auto;background:var(--bg);border-radius:7px;padding:3px 10px;font-size:13px;font-weight:700;color:var(--nv2)}
hr.div{border:none;border-top:1px dashed var(--bd);margin:18px 0}

/* ── 선택 버튼 ── */
.bgrid{display:flex;flex-wrap:wrap;gap:8px}
.sb{padding:9px 15px;background:var(--bg);border:2px solid var(--bd);border-radius:10px;font-size:14px;font-weight:700;color:var(--sb);transition:all .13s}
.sb:hover{border-color:var(--nv2);color:var(--nv)}
.sb.on{background:var(--nv);border-color:var(--nv);color:#fff}
.nb{padding:9px 12px;background:var(--bg);border:2px solid var(--bd);border-radius:10px;font-size:14px;font-weight:600;color:var(--sb);transition:all .13s}
.nb:hover{border-color:var(--nv2);color:var(--nv)}
.nb.on{background:var(--nv2);border-color:var(--nv2);color:#fff}

/* ── 비밀번호 ── */
.pw-row{display:flex;gap:9px;align-items:stretch}
.pw-in{flex:1;padding:13px 14px;border:2px solid var(--bd);border-radius:10px;font-family:inherit;font-size:15px;color:var(--tx);background:#FAFBFF;outline:none;transition:border-color .2s,box-shadow .2s}
.pw-in:focus{border-color:var(--nv2);box-shadow:0 0 0 4px rgba(27,47,122,.08)}
.btn-login{padding:13px 18px;background:linear-gradient(135deg,var(--nv),var(--nv2));color:#fff;border-radius:10px;font-size:14px;font-weight:800;box-shadow:0 4px 14px rgba(15,31,92,.28);transition:transform .13s,box-shadow .13s;white-space:nowrap}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(15,31,92,.32)}
.btn-login:disabled{opacity:.5;transform:none;cursor:not-allowed}

/* ── 반응형 ── */
@media(min-width:480px){
  .lcard{margin:0 22px;padding:30px 26px}
}
@media(min-width:700px){
  #view-login{justify-content:center}
  .lhd{padding:60px 24px 34px}
  .lcard{max-width:480px;margin:0 auto 48px}
}
</style>
</head>
<body>

<div id="toast"></div>

<div id="view-login">

  <!-- admin 버튼 -->
  <a href="admin.html" class="admin-btn">⚙️ Admin</a>

  <!-- 헤더 -->
  <div class="lhd">
    <div class="emblem">🎓</div>
    <h1>Handong International School</h1>
    <p class="sub">한동글로벌학교 중고등부</p>
    <div class="ptc-chip">📅 PTC 예약 2026 · 5월 15일</div>
  </div>

  <!-- 로그인 카드 -->
  <div class="lcard">

    <!-- STEP 1 학년 -->
    <div id="s1">
      <div class="step-hd">
        <div class="sn active" id="n1">1</div>
        <span class="slabel">학년 선택</span>
        <span class="sval hidden" id="v1"></span>
      </div>
      <div class="bgrid">
        <button class="sb" onclick="pickGrade(7,this)">7</button>
        <button class="sb" onclick="pickGrade(8,this)">8</button>
        <button class="sb" onclick="pickGrade(9,this)">9</button>
        <button class="sb" onclick="pickGrade(10,this)">10</button>
        <button class="sb" onclick="pickGrade(11,this)">11</button>
        <button class="sb" onclick="pickGrade(12,this)">12</button>
      </div>
    </div>

    <hr class="div">

    <!-- STEP 2 반 -->
    <div id="s2" class="locked">
      <div class="step-hd">
        <div class="sn" id="n2">2</div>
        <span class="slabel">반 선택</span>
        <span class="sval hidden" id="v2"></span>
      </div>
      <div class="bgrid" id="cls-btns">
        <p style="font-size:13px;color:var(--sb)">학년을 먼저 선택하세요</p>
      </div>
    </div>

    <hr class="div">

    <!-- STEP 3 이름 -->
    <div id="s3" class="locked">
      <div class="step-hd">
        <div class="sn" id="n3">3</div>
        <span class="slabel">이름 선택</span>
        <span class="sval hidden" id="v3"></span>
      </div>
      <div class="bgrid" id="name-btns">
        <p style="font-size:13px;color:var(--sb)">반을 먼저 선택하세요</p>
      </div>
    </div>

    <hr class="div">

    <!-- STEP 4 비밀번호 -->
    <div id="s4" class="locked">
      <div class="step-hd">
        <div class="sn" id="n4">4</div>
        <span class="slabel">비밀번호 입력</span>
      </div>
      <div class="pw-row">
        <input type="password" id="pw" class="pw-in" placeholder="비밀번호"
               onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-login" id="btn-login" onclick="doLogin()">로그인</button>
      </div>
      <p style="font-size:11px;color:var(--sb);margin-top:8px">※ 비밀번호는 학교에서 안내한 번호입니다</p>
    </div>

  </div>
</div>

<script>
// ── 상태 ─────────────────────────────────────────
const S = { grade:null, cls:null, name:null, students:[] };

// ── 토스트 ───────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 3500);
}

// ── students.json 로드 ───────────────────────────
async function loadStudents() {
  try {
    const r = await fetch('data/students.json');
    if (!r.ok) throw new Error();
    S.students = await r.json();
  } catch(e) {
    toast('학생 데이터를 불러올 수 없습니다.', 'err');
  }
}
loadStudents();

// ── 단계 헬퍼 ───────────────────────────────────
function stepDone(n, v)  { setSN(n,'done','✓'); setV(n, v); }
function stepActive(n)   { setSN(n,'active', n); hideV(n); }
function stepReset(n)    { setSN(n,'', n); hideV(n); }
function setSN(n,cls,txt){ const el=document.getElementById('n'+n); el.className='sn'+(cls?' '+cls:''); el.textContent=txt; }
function setV(n, v)      { const el=document.getElementById('v'+n); el.textContent=v; el.classList.remove('hidden'); }
function hideV(n)        { document.getElementById('v'+n).classList.add('hidden'); }
function lock(n)         { document.getElementById('s'+n).classList.add('locked'); }
function unlock(n)       { document.getElementById('s'+n).classList.remove('locked'); }
function esc(s)          { return String(s).replace(/'/g,"\\'"); }

// ── STEP 1: 학년 선택 ────────────────────────────
function pickGrade(g, btn) {
  S.grade = g; S.cls = null; S.name = null;

  document.querySelectorAll('#s1 .sb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  stepDone(1, g + '학년');

  // 반 버튼 생성 (7~9: A,B / 10~12: A,B,C)
  const classes = (g >= 7 && g <= 9) ? ['A','B'] : ['A','B','C'];
  document.getElementById('cls-btns').innerHTML = classes.map(c =>
    `<button class="sb" onclick="pickClass('${c}',this)">${c}</button>`
  ).join('');

  unlock(2); stepActive(2);
  lock(3); stepReset(3);
  document.getElementById('name-btns').innerHTML = '<p style="font-size:13px;color:var(--sb)">반을 먼저 선택하세요</p>';
  lock(4); stepReset(4);
  document.getElementById('pw').value = '';
}

// ── STEP 2: 반 선택 ──────────────────────────────
function pickClass(c, btn) {
  S.cls = c; S.name = null;

  document.querySelectorAll('#cls-btns .sb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  stepDone(2, c + '반');

  unlock(3); stepActive(3);
  lock(4); stepReset(4);
  document.getElementById('pw').value = '';

  // students.json에서 해당 학년/반 이름 필터
  const names = S.students
    .filter(s => String(s['학년']) === String(S.grade) && s['반'] === c)
    .map(s => s['이름']);

  if (!names.length) {
    document.getElementById('name-btns').innerHTML =
      '<p style="font-size:13px;color:var(--sb)">해당 학년/반 학생이 없습니다.</p>';
    return;
  }

  document.getElementById('name-btns').innerHTML = names.map(n =>
    `<button class="nb" onclick="pickName('${esc(n)}',this)">${n}</button>`
  ).join('');
}

// ── STEP 3: 이름 선택 ────────────────────────────
function pickName(n, btn) {
  S.name = n;
  document.querySelectorAll('#name-btns .nb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  stepDone(3, n);
  unlock(4); stepActive(4);
  setTimeout(() => document.getElementById('pw').focus(), 80);
}

// ── STEP 4: 로그인 ───────────────────────────────
function doLogin() {
  if (!S.grade || !S.cls || !S.name) {
    toast('학년, 반, 이름을 모두 선택해주세요.', 'err'); return;
  }
  const pw = document.getElementById('pw').value.trim();
  if (!pw) { toast('비밀번호를 입력해주세요.', 'err'); return; }

  const student = S.students.find(s =>
    String(s['학년']) === String(S.grade) &&
    s['반'] === S.cls &&
    s['이름'] === S.name
  );

  if (!student) { toast('학생 정보를 찾을 수 없습니다.', 'err'); return; }
  if (String(student['비밀번호']) !== pw) {
    toast('비밀번호가 올바르지 않습니다.', 'err');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
    return;
  }

  // 로그인 성공 → 다음 단계로 (추후 연결)
  sessionStorage.setItem('his_student', JSON.stringify({
    학년: student['학년'],
    반:   student['반'],
    이름: student['이름'],
    예약횟수: student['예약횟수'],
  }));
  toast(`${S.name} 로그인 성공! 🎉`, 'ok');

  // TODO: 다음 페이지(교사 선택)로 이동
  // window.location.href = 'teachers.html';  또는 showView('teachers')
}
</script>
</body>
</html>
